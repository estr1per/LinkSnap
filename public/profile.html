<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль - LinkSnap</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/dark-theme.css">
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👤</text></svg>">
    <style>
        .settings-section {
            background: var(--bg-primary);
            border-radius: var(--radius-xl);
            padding: var(--space-xl);
            margin-bottom: var(--space-xl);
            border: 1px solid var(--bg-tertiary);
        }
        .settings-section h3 {
            margin-bottom: var(--space-lg);
            padding-bottom: var(--space-sm);
            border-bottom: 2px solid var(--primary);
            display: inline-block;
        }
        .settings-section h3 i {
            margin-right: var(--space-sm);
            color: var(--primary);
        }
        .info-row {
            display: flex;
            padding: var(--space-sm) 0;
            border-bottom: 1px solid var(--bg-tertiary);
        }
        .info-label {
            width: 150px;
            font-weight: 600;
            color: var(--text-secondary);
        }
        .info-label i {
            width: 20px;
            margin-right: var(--space-sm);
            color: var(--primary);
        }
        .info-value {
            flex: 1;
            color: var(--text-primary);
        }
        .tag-filter-bar {
            display: flex;
            gap: var(--space-md);
            margin-bottom: var(--space-lg);
            flex-wrap: wrap;
            align-items: center;
        }
        .tag-filter-input {
            flex: 1;
            min-width: 200px;
            position: relative;
        }
        .tag-filter-input input {
            width: 100%;
        }
        .filter-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--bg-primary);
            border: 1px solid var(--bg-tertiary);
            border-radius: var(--radius-md);
            max-height: 150px;
            overflow-y: auto;
            z-index: 100;
            display: none;
        }
        .filter-suggestions.show { display: block; }
        .filter-suggestion-item {
            padding: var(--space-sm) var(--space-md);
            cursor: pointer;
            transition: all var(--transition-base);
            font-size: var(--text-sm);
        }
        .filter-suggestion-item:hover {
            background: var(--primary-bg);
            color: var(--primary);
        }
        .selected-tags {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-sm);
            margin: var(--space-md) 0;
        }
        .selected-tag {
            background: var(--gradient-primary);
            color: white;
            padding: 4px 12px;
            border-radius: var(--radius-full);
            font-size: var(--text-sm);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .selected-tag .remove {
            cursor: pointer;
            font-weight: bold;
            opacity: 0.8;
        }
        .selected-tag .remove:hover { opacity: 1; }
        .history-list {
            max-height: 500px;
            overflow-y: auto;
        }
        .history-item {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: var(--space-lg);
            margin-bottom: var(--space-md);
            transition: all var(--transition-base);
            border: 1px solid var(--bg-tertiary);
        }
        .history-item:hover {
            transform: translateX(5px);
            border-color: var(--primary-light);
        }
        .history-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: var(--space-sm);
            margin-bottom: var(--space-sm);
        }
        .history-url {
            font-size: var(--text-sm);
            color: var(--text-secondary);
            word-break: break-all;
            margin-top: var(--space-xs);
        }
        .history-date {
            font-size: var(--text-xs);
            color: var(--text-muted);
        }
        .tag-editor {
            display: flex;
            gap: var(--space-sm);
            margin-top: var(--space-md);
            flex-wrap: wrap;
            align-items: center;
        }
        .tag-editor input {
            flex: 1;
            min-width: 150px;
            padding: var(--space-sm) var(--space-md);
            font-size: var(--text-sm);
        }
        .tag-suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-xs);
            margin-top: var(--space-sm);
        }
        .tag-suggestion {
            background: var(--bg-tertiary);
            padding: 4px 10px;
            border-radius: var(--radius-full);
            font-size: var(--text-xs);
            cursor: pointer;
            transition: all var(--transition-base);
            color: var(--text-secondary);
        }
        .tag-suggestion:hover {
            background: var(--gradient-primary);
            color: white;
        }
        .btn-group {
            display: flex;
            gap: var(--space-sm);
            flex-wrap: wrap;
        }
        .btn-sm {
            padding: var(--space-xs) var(--space-md);
            font-size: var(--text-sm);
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: var(--space-sm);
            margin-top: var(--space-lg);
        }
        .plan-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: var(--radius-full);
            font-size: var(--text-sm);
            font-weight: 600;
            background: var(--gradient-primary);
            color: white;
        }
        .limit-progress {
            background: var(--bg-tertiary);
            border-radius: var(--radius-full);
            height: 8px;
            overflow: hidden;
            margin: var(--space-sm) 0;
        }
        .limit-progress-fill {
            background: var(--gradient-primary);
            height: 100%;
            width: 0%;
            transition: width var(--transition-slow);
        }
        .api-key {
            background: var(--bg-secondary);
            padding: var(--space-md);
            border-radius: var(--radius-md);
            font-family: monospace;
            word-break: break-all;
            margin: var(--space-md) 0;
            border: 1px solid var(--primary);
        }
        .empty-state {
            text-align: center;
            padding: var(--space-3xl);
            color: var(--text-muted);
            background: var(--bg-secondary);
            border-radius: var(--radius-xl);
        }
        .filter-info {
            background: var(--primary-bg);
            padding: var(--space-md);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-lg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: var(--space-sm);
        }
        @media (max-width: 768px) {
            .info-row { flex-direction: column; }
            .info-label { width: 100%; margin-bottom: var(--space-xs); }
            .tag-filter-bar { flex-direction: column; align-items: stretch; }
            .tag-editor { flex-direction: column; }
            .settings-section { padding: var(--space-lg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="site-header">
            <div class="logo-container">
                <i class="fas fa-link" style="font-size: 2rem; color: var(--primary);"></i>
                <a href="/" class="site-title">LinkSnap</a>
            </div>
            <div class="user-nav">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar"></div>
                    <span class="user-name" id="username">Загрузка...</span>
                </div>
                <div class="theme-switch-wrapper">
                    <i class="fas fa-moon theme-icon"></i>
                    <label class="theme-switch">
                        <input type="checkbox" id="themeToggle">
                        <span class="theme-slider"></span>
                    </label>
                    <i class="fas fa-sun theme-icon"></i>
                </div>
                <a href="/dashboard" class="nav-btn"><i class="fas fa-chart-line"></i> Аналитика</a>
                <a href="/batch" class="nav-btn"><i class="fas fa-layer-group"></i> Массовое</a>
                <a href="/pricing" class="nav-btn"><i class="fas fa-tag"></i> Тарифы</a>
                <a href="/converter" class="nav-btn"><i class="fas fa-exchange-alt"></i> Конвертер</a>
                <a href="/image-editor" class="nav-btn"><i class="fas fa-crop-alt"></i> Редактор</a>
                <button onclick="logout()" class="btn btn-danger btn-sm"><i class="fas fa-sign-out-alt"></i> Выйти</button>
            </div>
        </header>

        <h2><i class="fas fa-user-circle"></i> Мой профиль</h2>
        <p><i class="fas fa-sliders-h"></i> Управление аккаунтом, тарифом и историей</p>

        <div class="settings-section">
            <h3><i class="fas fa-info-circle"></i> Информация об аккаунте</h3>
            <div id="userInfo"><div class="loading"><div class="loading-spinner"></div><span>Загрузка...</span></div></div>
        </div>

        <div class="settings-section">
            <h3><i class="fas fa-gem"></i> Тарифный план</h3>
            <div id="planInfo"><div class="loading"><div class="loading-spinner"></div><span>Загрузка...</span></div></div>
        </div>

        <div class="settings-section">
            <h3><i class="fas fa-filter"></i> Фильтр по тегам</h3>
            <div class="tag-filter-bar">
                <div class="tag-filter-input">
                    <input type="text" id="tagFilterInput" class="form-control" placeholder="Введите тег..." autocomplete="off">
                    <div id="filterSuggestions" class="filter-suggestions"></div>
                </div>
                <button onclick="addFilterTag()" class="btn btn-primary btn-sm"><i class="fas fa-plus"></i> Добавить тег</button>
                <button onclick="clearFilter()" class="btn btn-secondary btn-sm"><i class="fas fa-trash-alt"></i> Очистить фильтр</button>
                <button onclick="exportFilteredLinks()" class="btn btn-success btn-sm"><i class="fas fa-file-csv"></i> Экспорт CSV</button>
            </div>
            <div id="selectedTags" class="selected-tags"></div>
            <div id="filterInfo" class="filter-info" style="display: none;"></div>
            <div id="filterResult"></div>
        </div>

        <div class="settings-section">
            <h3><i class="fas fa-history"></i> История ссылок</h3>
            <div class="btn-group" style="margin-bottom: var(--space-lg);">
                <button onclick="loadLinksHistory(1)" class="btn btn-secondary btn-sm"><i class="fas fa-sync-alt"></i> Обновить</button>
                <button onclick="clearLinksHistory()" class="btn btn-danger btn-sm"><i class="fas fa-trash-alt"></i> Очистить все ссылки</button>
            </div>
            <div id="linksHistory" class="history-list"><div class="loading"><div class="loading-spinner"></div><span>Загрузка...</span></div></div>
            <div id="pagination" class="pagination"></div>
        </div>

        <div class="settings-section">
            <h3><i class="fas fa-qrcode"></i> История QR-кодов</h3>
            <div class="btn-group" style="margin-bottom: var(--space-lg);">
                <button onclick="loadQRCodesHistory()" class="btn btn-secondary btn-sm"><i class="fas fa-sync-alt"></i> Обновить</button>
                <button onclick="clearQRCodesHistory()" class="btn btn-danger btn-sm"><i class="fas fa-trash-alt"></i> Очистить QR-коды</button>
            </div>
            <div id="qrcodesHistory" class="history-list"><div class="loading"><div class="loading-spinner"></div><span>Загрузка...</span></div></div>
        </div>
    </div>

    <script>
        let currentPage = 1, totalPages = 1, filterTags = [], allTagsList = [];

        async function checkAuth() {
            try {
                const res = await fetch('/api/user');
                if (res.status === 401) { window.location.href = '/login'; return false; }
                const user = await res.json();
                document.getElementById('username').textContent = user.username;
                document.getElementById('userAvatar').textContent = user.username.charAt(0).toUpperCase();
                await loadUserInfo(); await loadPlanInfo(); await loadAllTags(); await loadLinksHistory(1); await loadQRCodesHistory();
                return true;
            } catch(e) { window.location.href = '/login'; return false; }
        }

        async function logout() { await fetch('/api/logout', { method: 'POST' }); window.location.href = '/login'; }

        async function loadUserInfo() {
            try {
                const res = await fetch('/api/user');
                const user = await res.json();
                document.getElementById('userInfo').innerHTML = `
                    <div class="info-row"><div class="info-label"><i class="fas fa-user"></i> Имя пользователя:</div><div class="info-value">${escapeHtml(user.username)}</div></div>
                    <div class="info-row"><div class="info-label"><i class="fas fa-envelope"></i> Email:</div><div class="info-value">${escapeHtml(user.email)}</div></div>
                    <div class="info-row"><div class="info-label"><i class="fas fa-calendar-alt"></i> Дата регистрации:</div><div class="info-value">${new Date(user.created_at).toLocaleDateString()}</div></div>
                `;
            } catch(e) { document.getElementById('userInfo').innerHTML = '<div class="alert alert-error">Ошибка загрузки</div>'; }
        }

        async function loadPlanInfo() {
            try {
                const res = await fetch('/api/user/plan');
                const data = await res.json();
                const planNames = { free: 'Бесплатный', premium: 'Премиум', business: 'Бизнес' };
                const maxLinks = data.limits.maxLinks === 999999 ? '∞' : data.limits.maxLinks;
                const maxQR = data.limits.maxQR === 999999 ? '∞' : data.limits.maxQR;
                const linksPercent = data.limits.maxLinks === 999999 ? 0 : (data.limits.currentLinks / data.limits.maxLinks) * 100;
                const qrPercent = data.limits.maxQR === 999999 ? 0 : (data.limits.currentQR / data.limits.maxQR) * 100;
                let apiHtml = '';
                if (data.plan === 'business') apiHtml = `<div style="margin-top: var(--space-lg);"><button onclick="generateApiKey()" class="btn btn-primary btn-sm"><i class="fas fa-key"></i> Сгенерировать API ключ</button><div id="apiKeyDisplay" class="api-key" style="display:none;"></div></div>`;
                document.getElementById('planInfo').innerHTML = `
                    <div class="info-row"><div class="info-label"><i class="fas fa-tag"></i> Текущий тариф:</div><div class="info-value"><span class="plan-badge">${planNames[data.plan]}</span></div></div>
                    <div class="info-row"><div class="info-label"><i class="fas fa-link"></i> Ссылки в этом месяце:</div><div class="info-value">${data.limits.currentLinks} из ${maxLinks}</div></div>
                    <div class="limit-progress"><div class="limit-progress-fill" style="width: ${Math.min(100, linksPercent)}%;"></div></div>
                    <div class="info-row"><div class="info-label"><i class="fas fa-qrcode"></i> QR-коды в этом месяце:</div><div class="info-value">${data.limits.currentQR} из ${maxQR}</div></div>
                    <div class="limit-progress"><div class="limit-progress-fill" style="width: ${Math.min(100, qrPercent)}%;"></div></div>
                    <div class="info-row" style="margin-top: var(--space-lg);"><div class="info-label"></div><div class="info-value"><a href="/pricing" class="btn btn-primary btn-sm"><i class="fas fa-exchange-alt"></i> Сменить тариф</a></div></div>
                    ${apiHtml}
                `;
            } catch(e) { document.getElementById('planInfo').innerHTML = '<div class="alert alert-error">Ошибка загрузки</div>'; }
        }

        async function loadAllTags() {
            try { const res = await fetch('/api/tags/all'); const tags = await res.json(); allTagsList = tags || []; } catch(e) { console.error('Ошибка загрузки тегов:', e); }
        }

        function setupFilterAutocomplete() {
            const input = document.getElementById('tagFilterInput');
            const suggestionsDiv = document.getElementById('filterSuggestions');
            if (!input) return;
            input.addEventListener('input', function() {
                const value = this.value.toLowerCase().trim();
                if (value.length < 1) { suggestionsDiv.classList.remove('show'); return; }
                const filteredTags = allTagsList.map(t => t.name).filter(tag => tag.toLowerCase().includes(value) && !filterTags.includes(tag)).slice(0, 5);
                if (filteredTags.length > 0) {
                    suggestionsDiv.innerHTML = filteredTags.map(tag => `<div class="filter-suggestion-item" onclick="selectFilterTag('${escapeHtml(tag)}')"><i class="fas fa-tag"></i> ${escapeHtml(tag)}</div>`).join('');
                    suggestionsDiv.classList.add('show');
                } else { suggestionsDiv.classList.remove('show'); }
            });
            input.addEventListener('blur', function() { setTimeout(() => suggestionsDiv.classList.remove('show'), 200); });
            input.addEventListener('keypress', function(e) { if (e.key === 'Enter') { e.preventDefault(); addFilterTag(); } });
        }
        
        function selectFilterTag(tag) { document.getElementById('tagFilterInput').value = tag; addFilterTag(); }

        function addFilterTag() {
            const input = document.getElementById('tagFilterInput');
            const tag = input.value.trim().toLowerCase();
            if (tag && !filterTags.includes(tag)) { filterTags.push(tag); renderSelectedTags(); applyFilter(); }
            input.value = ''; document.getElementById('filterSuggestions').classList.remove('show');
        }

        function renderSelectedTags() {
            const container = document.getElementById('selectedTags');
            if (filterTags.length === 0) { container.innerHTML = '<small style="color: var(--text-muted);"><i class="fas fa-info-circle"></i> Нет выбранных тегов</small>'; return; }
            container.innerHTML = filterTags.map(tag => `<span class="selected-tag"><i class="fas fa-tag"></i> ${escapeHtml(tag)}<span class="remove" onclick="removeFilterTag('${escapeHtml(tag)}')"><i class="fas fa-times"></i></span></span>`).join('');
        }

        function removeFilterTag(tag) { filterTags = filterTags.filter(t => t !== tag); renderSelectedTags(); applyFilter(); }
        function clearFilter() { filterTags = []; renderSelectedTags(); document.getElementById('filterInfo').style.display = 'none'; loadLinksHistory(1); }

        async function applyFilter() {
            const container = document.getElementById('linksHistory');
            const filterInfo = document.getElementById('filterInfo');
            if (filterTags.length === 0) { filterInfo.style.display = 'none'; await loadLinksHistory(1); return; }
            filterInfo.style.display = 'flex';
            filterInfo.innerHTML = `<span><i class="fas fa-filter"></i> Фильтр по тегам: <strong>${filterTags.join(', ')}</strong></span><button onclick="clearFilter()" class="btn btn-sm btn-secondary"><i class="fas fa-times"></i> Очистить</button>`;
            container.innerHTML = '<div class="loading"><div class="loading-spinner"></div><span>Фильтрация...</span></div>';
            try {
                const tagsParam = filterTags.join(',');
                const res = await fetch(`/api/links/filter?tags=${encodeURIComponent(tagsParam)}&page=1&limit=50`);
                const data = await res.json();
                if (data.data && data.data.length > 0) { renderFilteredLinks(data.data); document.getElementById('pagination').innerHTML = ''; }
                else { container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i> Нет ссылок с выбранными тегами</div>'; }
            } catch(e) { container.innerHTML = '<div class="alert alert-error">Ошибка фильтрации</div>'; }
        }

        function renderFilteredLinks(links) { document.getElementById('linksHistory').innerHTML = links.map(link => renderLinkItem(link)).join(''); }

        async function loadLinksHistory(page = 1) {
            if (filterTags.length > 0) { await applyFilter(); return; }
            const container = document.getElementById('linksHistory');
            container.innerHTML = '<div class="loading"><div class="loading-spinner"></div><span>Загрузка...</span></div>';
            try {
                const res = await fetch(`/api/links?page=${page}&limit=10`);
                const data = await res.json();
                renderLinks(data.data || []);
                renderPagination(data.pagination);
            } catch(e) { container.innerHTML = '<div class="alert alert-error">Ошибка загрузки</div>'; }
        }

        function renderLinks(links) {
            const container = document.getElementById('linksHistory');
            if (!links || !links.length) { container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i> Нет созданных ссылок</div>'; return; }
            container.innerHTML = links.map(link => renderLinkItem(link)).join('');
        }

        function renderLinkItem(link) {
            return `<div class="history-item" data-link-id="${link.id}">
                <div class="history-item-header">
                    <div><strong><i class="fas fa-link"></i> /${escapeHtml(link.short_code)}</strong> <span class="history-date"><i class="far fa-calendar-alt"></i> ${new Date(link.created_at).toLocaleDateString()}</span></div>
                    <span><i class="fas fa-mouse-pointer"></i> ${link.clicks || 0} кликов</span>
                </div>
                <div class="history-url"><i class="fas fa-external-link-alt"></i> ${escapeHtml(link.original_url)}</div>
                <div class="tag-editor">
                    <input type="text" class="form-control tag-input" placeholder="Теги через запятую" value="${escapeHtml(link.tags || '')}" data-link-id="${link.id}" data-original-tags="${escapeHtml(link.tags || '')}">
                    <button onclick="saveTags(${link.id}, this)" class="btn btn-primary btn-sm"><i class="fas fa-save"></i> Сохранить</button>
                </div>
                <div class="tag-suggestions" id="suggestions-${link.id}"></div>
                <div style="margin-top: var(--space-md);">
                    <a href="/${link.short_code}" target="_blank" class="btn btn-secondary btn-sm"><i class="fas fa-external-link-alt"></i> Перейти</a>
                    <button onclick="deleteLink(${link.id})" class="btn btn-danger btn-sm"><i class="fas fa-trash-alt"></i> Удалить</button>
                </div>
            </div>`;
        }

        let recommendTimeout;
        async function recommendTags(inputElement, linkId) {
            clearTimeout(recommendTimeout);
            const url = document.querySelector(`.history-item[data-link-id="${linkId}"] .history-url`)?.innerText;
            if (!url || url.length < 10) return;
            recommendTimeout = setTimeout(async () => {
                try {
                    const res = await fetch(`/api/tags/recommend?url=${encodeURIComponent(url)}`);
                    const data = await res.json();
                    const suggestionsContainer = document.getElementById(`suggestions-${linkId}`);
                    if (data.recommendations && data.recommendations.length > 0) {
                        suggestionsContainer.innerHTML = `<span><i class="fas fa-lightbulb"></i> Рекомендуемые:</span>${data.recommendations.map(tag => `<span class="tag-suggestion" onclick="addTagToInput(${linkId}, '${escapeHtml(tag)}')"><i class="fas fa-tag"></i> ${escapeHtml(tag)}</span>`).join('')}`;
                    } else { suggestionsContainer.innerHTML = ''; }
                } catch(e) { console.error('Ошибка рекомендации:', e); }
            }, 500);
        }

        function addTagToInput(linkId, tag) {
            const input = document.querySelector(`.tag-input[data-link-id="${linkId}"]`);
            if (input) {
                const currentTags = input.value;
                const tags = currentTags ? currentTags.split(',').map(t => t.trim()) : [];
                if (!tags.includes(tag)) { tags.push(tag); input.value = tags.join(', '); input.dispatchEvent(new Event('input', { bubbles: true })); }
            }
        }

        async function saveTags(linkId, button) {
            const input = button.previousElementSibling;
            const tags = input.value;
            const originalTags = input.getAttribute('data-original-tags');
            if (tags === originalTags) { alert('Теги не изменились'); return; }
            button.disabled = true; button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Сохранение...';
            try {
                const res = await fetch(`/api/links/${linkId}/tags`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tags }) });
                const data = await res.json();
                if (res.ok) {
                    input.setAttribute('data-original-tags', tags);
                    alert('<i class="fas fa-check-circle"></i> Теги сохранены');
                    await loadAllTags();
                    if (filterTags.length > 0) await applyFilter(); else await loadLinksHistory(currentPage);
                } else { alert('Ошибка: ' + data.error); }
            } catch(e) { alert('Ошибка соединения'); }
            finally { button.disabled = false; button.innerHTML = '<i class="fas fa-save"></i> Сохранить'; }
        }

        async function deleteLink(linkId) {
            if (!confirm('Удалить эту ссылку?')) return;
            try {
                const res = await fetch(`/api/links/${linkId}`, { method: 'DELETE' });
                if (res.ok) { if (filterTags.length > 0) await applyFilter(); else await loadLinksHistory(currentPage); await loadAllTags(); }
                else { alert('Ошибка удаления'); }
            } catch(e) { alert('Ошибка соединения'); }
        }

        async function exportFilteredLinks() {
            try {
                let url = `/api/links/export?format=csv`;
                if (filterTags.length > 0) url += `&tags=${encodeURIComponent(filterTags.join(','))}`;
                const res = await fetch(url);
                const blob = await res.blob();
                const downloadUrl = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                const filename = filterTags.length > 0 ? `links-export-${filterTags.join('-')}.csv` : 'links-export-all.csv';
                a.download = filename;
                a.click();
                URL.revokeObjectURL(downloadUrl);
            } catch(e) { alert('Ошибка экспорта'); }
        }

        function renderPagination(pagination) {
            const container = document.getElementById('pagination');
            if (!pagination) return;
            currentPage = pagination.page; totalPages = pagination.pages;
            if (totalPages <= 1) { container.innerHTML = ''; return; }
            let html = '';
            if (currentPage > 1) html += `<button onclick="loadLinksHistory(${currentPage - 1})" class="btn btn-secondary btn-sm"><i class="fas fa-chevron-left"></i> Назад</button>`;
            html += `<span style="padding: 0 var(--space-md);">Стр. ${currentPage} из ${totalPages}</span>`;
            if (currentPage < totalPages) html += `<button onclick="loadLinksHistory(${currentPage + 1})" class="btn btn-secondary btn-sm">Вперед <i class="fas fa-chevron-right"></i></button>`;
            container.innerHTML = html;
        }

        async function loadQRCodesHistory() {
            const container = document.getElementById('qrcodesHistory');
            try {
                const res = await fetch('/api/qrcodes');
                const qrcodes = await res.json();
                if (!qrcodes || !qrcodes.length) { container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i> Нет созданных QR-кодов</div>'; return; }
                container.innerHTML = qrcodes.map(qr => `<div class="history-item"><div style="display: flex; gap: var(--space-lg); align-items: flex-start; flex-wrap: wrap;"><div style="background: ${qr.bg_color || '#ffffff'}; padding: var(--space-md); border-radius: var(--radius-md);"><img src="${qr.qr_data}" style="width: 100px; height: 100px; border-radius: var(--radius-sm);"></div><div style="flex: 1;"><div><strong><i class="fas fa-qrcode"></i> QR-код</strong> <span class="history-date"><i class="far fa-calendar-alt"></i> ${new Date(qr.created_at).toLocaleDateString()}</span></div><div class="history-url" style="margin: var(--space-sm) 0;"><i class="fas fa-link"></i> ${escapeHtml(qr.original_url)}</div><div><button onclick="downloadQR('${qr.qr_data}', 'png')" class="btn btn-secondary btn-sm"><i class="fas fa-download"></i> Скачать PNG</button><a href="${escapeHtml(qr.original_url)}" target="_blank" class="btn btn-primary btn-sm"><i class="fas fa-external-link-alt"></i> Открыть ссылку</a></div></div></div></div>`).join('');
            } catch(e) { container.innerHTML = '<div class="alert alert-error">Ошибка загрузки</div>'; }
        }

        function downloadQR(qrData, format) { const link = document.createElement('a'); link.href = qrData; link.download = `qrcode-${Date.now()}.${format}`; link.click(); }

        async function clearLinksHistory() {
            if (!confirm('Удалить все ссылки? Это действие нельзя отменить.')) return;
            const res = await fetch('/api/links', { method: 'DELETE' });
            const data = await res.json();
            alert(data.message);
            filterTags = []; renderSelectedTags(); document.getElementById('filterInfo').style.display = 'none';
            await loadLinksHistory(1); await loadPlanInfo(); await loadAllTags();
        }

        async function clearQRCodesHistory() {
            if (!confirm('Удалить все QR-коды? Это действие нельзя отменить.')) return;
            const res = await fetch('/api/qrcodes', { method: 'DELETE' });
            const data = await res.json();
            alert(data.message);
            await loadQRCodesHistory(); await loadPlanInfo();
        }

        async function generateApiKey() {
            try {
                const res = await fetch('/api/user/generate-api-key', { method: 'POST' });
                const data = await res.json();
                if (res.ok) { const apiDiv = document.getElementById('apiKeyDisplay'); apiDiv.innerHTML = `<i class="fas fa-key"></i> Ваш API ключ: <code>${data.apiKey}</code>`; apiDiv.style.display = 'block'; setTimeout(() => apiDiv.style.display = 'none', 10000); }
                else { alert('Ошибка: ' + data.error); }
            } catch(e) { alert('Ошибка соединения'); }
        }

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m)); }

        document.addEventListener('input', function(e) { if (e.target.classList && e.target.classList.contains('tag-input')) { const linkId = parseInt(e.target.getAttribute('data-link-id')); if (linkId) recommendTags(e.target, linkId); } });

        (function() {
            const themeToggle = document.getElementById('themeToggle');
            const savedTheme = localStorage.getItem('linksnap-theme');
            if (savedTheme === 'dark') { document.body.classList.add('dark-theme'); if (themeToggle) themeToggle.checked = true; }
            if (themeToggle) { themeToggle.addEventListener('change', function() { if (this.checked) { document.body.classList.add('dark-theme'); localStorage.setItem('linksnap-theme', 'dark'); } else { document.body.classList.remove('dark-theme'); localStorage.setItem('linksnap-theme', 'light'); } }); }
        })();

        document.addEventListener('DOMContentLoaded', () => { checkAuth(); setupFilterAutocomplete(); });
    </script>
    <script src="/chat-widget.js?v=5" defer></script>
</body>
</html>
