<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель — Чаты поддержки</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/admin.css">
    <link rel="stylesheet" href="/dark-theme.css">
</head>
<body>
    <div class="admin-header">
        <div class="container">
            <div class="logo-container">
                <i class="fas fa-shield-alt" style="font-size: 2rem; color: var(--primary);"></i>
                <span class="site-title">LinkSnap Admin — Чаты</span>
            </div>
            <div class="admin-nav">
                <a href="/admin"><i class="fas fa-comments"></i> Чаты</a>
                <a href="/admin/users"><i class="fas fa-users"></i> Пользователи</a>
                <button id="logoutBtn" style="background: linear-gradient(135deg, #ef4444, #dc2626); color: white; border: none; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: 600;"><i class="fas fa-sign-out-alt"></i> Выйти</button>
            </div>
        </div>
    </div>

    <div class="container" id="adminPanel" style="display: none;">
        <div class="stats-grid">
            <div class="stat-card unread">
                <i class="fas fa-envelope" style="position: absolute; top: 20px; right: 20px; font-size: 2rem; opacity: 0.2;"></i>
                <h3 id="statUnread">0</h3>
                <p><i class="fas fa-envelope"></i> Непрочитанные</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-comment-dots" style="position: absolute; top: 20px; right: 20px; font-size: 2rem; opacity: 0.2;"></i>
                <h3 id="statActive">0</h3>
                <p><i class="fas fa-comment-dots"></i> Активные</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-chart-line" style="position: absolute; top: 20px; right: 20px; font-size: 2rem; opacity: 0.2;"></i>
                <h3 id="statTotal">0</h3>
                <p><i class="fas fa-chart-line"></i> Всего</p>
            </div>
        </div>

        <div class="chats-container">
            <div class="chats-list">
                <div class="chats-list-header">
                    <span><i class="fas fa-comments"></i> Чаты</span>
                    <button class="refresh-btn" onclick="loadChats()"><i class="fas fa-sync-alt"></i></button>
                </div>
                <div class="chats-list-items" id="chatsList">
                    <div style="padding: 40px; text-align: center;"><i class="fas fa-spinner fa-spin"></i> Загрузка чатов...</div>
                </div>
            </div>

            <div class="chat-detail" id="chatDetail" style="display: none;">
                <div class="chat-detail-header">
                    <div class="chat-detail-user">
                        <h3><i class="fas fa-user"></i> <span id="chatUserName">Пользователь</span></h3>
                        <p><i class="fas fa-envelope"></i> <span id="chatUserEmail">email@example.com</span></p>
                    </div>
                </div>
                <div class="messages-container" id="messagesContainer"></div>
                <div class="reply-form">
                    <textarea id="replyMessage" placeholder="Введите ответ..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendReply();}"></textarea>
                    <div class="reply-form-actions">
                        <span><i class="fas fa-keyboard"></i> Enter для отправки</span>
                        <button class="btn btn-primary" onclick="sendReply()"><i class="fas fa-paper-plane"></i> Отправить</button>
                    </div>
                </div>
            </div>

            <div class="chat-detail" id="emptyState">
                <div class="empty-state">
                    <i class="fas fa-comment-dots" style="font-size: 4rem; margin-bottom: 1rem; opacity: 0.5;"></i>
                    <h3>Выберите чат</h3>
                    <p>Выберите чат из списка слева</p>
                </div>
            </div>
        </div>
    </div>

    <div class="container" id="loadingPanel" style="text-align: center; padding: 50px;">
        <div class="loading"><div class="loading-spinner"></div><span><i class="fas fa-shield-alt"></i> Проверка авторизации...</span></div>
    </div>

    <script>
        let currentChatId = null;
        let messagesInterval = null;

        async function logout() {
            try {
                await fetch('/api/admin/logout', { method: 'POST' });
            } catch(e) {}
            window.location.href = '/admin/login';
        }

        async function checkAuth() {
            try {
                const res = await fetch('/api/admin/me');
                if (res.ok) {
                    document.getElementById('loadingPanel').style.display = 'none';
                    document.getElementById('adminPanel').style.display = 'block';
                    loadStats();
                    loadChats();
                    startPolling();
                } else {
                    window.location.href = '/admin/login';
                }
            } catch(e) {
                console.error('Ошибка:', e);
                window.location.href = '/admin/login';
            }
        }

        async function loadStats() {
            try {
                const res = await fetch('/api/admin/stats');
                const data = await res.json();
                if (data.success) {
                    document.getElementById('statUnread').textContent = data.stats.unread || 0;
                    document.getElementById('statActive').textContent = data.stats.active || 0;
                    document.getElementById('statTotal').textContent = data.stats.total || 0;
                }
            } catch(e) {}
        }

        async function loadChats() {
            try {
                const res = await fetch('/api/admin/chats');
                const data = await res.json();
                const container = document.getElementById('chatsList');
                
                if (!data.success || !data.chats || data.chats.length === 0) {
                    container.innerHTML = '<div style="padding: 40px; text-align: center;"><i class="fas fa-inbox"></i> Нет чатов</div>';
                    return;
                }

                container.innerHTML = data.chats.map(chat => `
                    <div class="chat-item ${chat.unread_count > 0 ? 'unread' : ''} ${currentChatId === chat.id ? 'active' : ''}" onclick="openChat(${chat.id})">
                        <div class="chat-item-header">
                            <span class="chat-item-name"><i class="fas fa-user-circle"></i> ${escapeHtml(chat.user_name || 'Аноним')}</span>
                            <span class="chat-item-time">${formatTime(chat.updated_at)}</span>
                        </div>
                        <div class="chat-item-last-message">${escapeHtml(chat.last_message || 'Нет сообщений')}</div>
                        <span class="chat-item-status status-${chat.is_closed ? 'closed' : 'active'}">
                            ${chat.is_closed ? '<i class="fas fa-lock"></i> Закрыт' : '<i class="fas fa-circle" style="color: #10b981;"></i> Активен'}
                            ${chat.unread_count > 0 ? ` • ${chat.unread_count} новых` : ''}
                        </span>
                    </div>
                `).join('');
            } catch(e) {}
        }

        function formatTime(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;
            if (diff < 60000) return 'только что';
            if (diff < 3600000) return Math.floor(diff / 60000) + ' мин';
            if (diff < 86400000) return Math.floor(diff / 3600000) + ' ч';
            return date.toLocaleDateString();
        }

        async function openChat(chatId, isPolling = false) {
            currentChatId = chatId;
            try {
                const res = await fetch(`/api/admin/chat/${chatId}`);
                const data = await res.json();
                if (!data.success) return;

                if (!isPolling) {
                    document.getElementById('chatUserName').textContent = data.user?.username || 'Неизвестно';
                    document.getElementById('chatUserEmail').textContent = data.user?.email || '';
                    document.getElementById('messagesContainer').innerHTML = '';
                    (data.messages || []).forEach(msg => addMessage(msg.message, msg.sender_type, msg.created_at, msg.id));
                    document.getElementById('emptyState').style.display = 'none';
                    document.getElementById('chatDetail').style.display = 'flex';
                    document.getElementById('messagesContainer').scrollTop = document.getElementById('messagesContainer').scrollHeight;
                } else {
                    const existingIds = new Set();
                    document.querySelectorAll('#messagesContainer .message').forEach(el => {
                        if (el.id) existingIds.add(el.id.replace('msg-', ''));
                    });
                    const newMessages = (data.messages || []).filter(msg => !existingIds.has(msg.id.toString()));
                    newMessages.forEach(msg => addMessage(msg.message, msg.sender_type, msg.created_at, msg.id));
                    if (newMessages.length > 0) {
                        document.getElementById('messagesContainer').scrollTop = document.getElementById('messagesContainer').scrollHeight;
                    }
                }
                loadChats();
            } catch(e) {}
        }

        function addMessage(text, type, timestamp, id) {
            if (document.getElementById(`msg-${id}`)) return;
            const msgDiv = document.createElement('div');
            msgDiv.className = `message message-${type}`;
            msgDiv.id = `msg-${id}`;
            const timeStr = timestamp ? new Date(timestamp).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' }) : '';
            msgDiv.innerHTML = `
                <div class="message-meta">${type === 'user' ? '<i class="fas fa-user"></i> Пользователь' : '<i class="fas fa-shield-alt"></i> Вы'} • ${timeStr}</div>
                <p class="message-text">${escapeHtml(text)}</p>
            `;
            document.getElementById('messagesContainer').appendChild(msgDiv);
        }

        function startPolling() {
            if (messagesInterval) clearInterval(messagesInterval);
            messagesInterval = setInterval(() => {
                if (currentChatId) openChat(currentChatId, true);
            }, 3000);
        }

        async function sendReply() {
            const message = document.getElementById('replyMessage').value.trim();
            if (!message || !currentChatId) return;
            const btn = document.querySelector('.reply-form .btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Отправка...';
            try {
                const res = await fetch(`/api/admin/chat/${currentChatId}/message`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('replyMessage').value = '';
                    await openChat(currentChatId, false);
                } else {
                    alert('Ошибка: ' + data.error);
                }
            } catch(e) {
                alert('Ошибка отправки');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> Отправить';
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            return String(text).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[m]));
        }

        document.getElementById('logoutBtn')?.addEventListener('click', logout);
        checkAuth();
        window.addEventListener('beforeunload', () => { if (messagesInterval) clearInterval(messagesInterval); });
    </script>
</body>
</html>
