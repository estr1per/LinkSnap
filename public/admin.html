<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель — Чаты поддержки</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/admin.css">
    <link rel="stylesheet" href="/dark-theme.css">
</head>
<body>
    <div class="admin-header">
        <div class="container">
            <div class="logo-container">
                <span class="logo">🛡️</span>
                <span class="site-title">LinkSnap Admin — Чаты</span>
            </div>
            <div class="admin-nav">
                <a href="/admin">💬 Чаты</a>
                <a href="/admin/users">👥 Пользователи</a>
                <button id="logoutBtn" class="logout-btn" style="background: linear-gradient(135deg, #ef4444, #dc2626); color: white; border: none; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: 600;">🚪 Выйти</button>
            </div>
        </div>
    </div>

    <div class="container" id="adminPanel">
        <div class="stats-grid">
            <div class="stat-card unread">
                <h3 id="statUnread">0</h3>
                <p>Непрочитанные</p>
            </div>
            <div class="stat-card">
                <h3 id="statActive">0</h3>
                <p>Активные</p>
            </div>
            <div class="stat-card">
                <h3 id="statTotal">0</h3>
                <p>Всего</p>
            </div>
        </div>

        <div class="chats-container">
            <div class="chats-list">
                <div class="chats-list-header">
                    <span>💬 Чаты</span>
                    <button class="refresh-btn" onclick="loadChats()">🔄</button>
                </div>
                <div class="chats-list-items" id="chatsList">
                    <div style="padding: 40px; text-align: center; color: var(--gray-500);">
                        Загрузка чатов...
                    </div>
                </div>
            </div>

            <div class="chat-detail" id="chatDetail" style="display: none;">
                <div class="chat-detail-header">
                    <div class="chat-detail-user">
                        <h3 id="chatUserName">Пользователь</h3>
                        <p id="chatUserEmail">email@example.com</p>
                    </div>
                </div>
                <div class="messages-container" id="messagesContainer">
                    <!-- Сообщения будут здесь -->
                </div>
                <div class="reply-form">
                    <textarea id="replyMessage" placeholder="Введите ответ..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendReply();}"></textarea>
                    <div class="reply-form-actions">
                        <span style="font-size: 0.85rem; color: var(--gray-500);">Enter для отправки, Shift+Enter для новой строки</span>
                        <button class="btn btn-primary" onclick="sendReply()">📤 Отправить</button>
                    </div>
                </div>
            </div>

            <div class="chat-detail" id="emptyState">
                <div class="empty-state">
                    <div class="empty-state-icon">💬</div>
                    <h3>Выберите чат</h3>
                    <p>Выберите чат из списка слева для просмотра сообщений</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentChatId = null;
        let messagesInterval = null;

        // Функция выхода - ОБЯЗАТЕЛЬНО ДОБАВЬ
        async function logout() {
            console.log('Выход из админки...');
            try {
                const res = await fetch('/api/admin/logout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await res.json();
                console.log('Ответ сервера:', data);
                // Всегда перенаправляем на страницу входа
                window.location.href = '/admin/login';
            } catch(e) {
                console.error('Ошибка выхода:', e);
                // Даже при ошибке перенаправляем
                window.location.href = '/admin/login';
            }
        }

        // Привязываем кнопку выхода
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', logout);
        }

        // Проверка авторизации
        async function checkAuth() {
            try {
                const res = await fetch('/api/admin/me');
                if (res.status === 401) {
                    window.location.href = '/admin/login';
                    return false;
                }
                const data = await res.json();
                if (!data.success) {
                    window.location.href = '/admin/login';
                    return false;
                }
                return true;
            } catch(e) {
                console.error('Ошибка проверки авторизации:', e);
                window.location.href = '/admin/login';
                return false;
            }
        }

        async function loadStats() {
            try {
                const res = await fetch('/api/admin/stats');
                const data = await res.json();
                if (data.success) {
                    document.getElementById('statUnread').textContent = data.stats.unread || 0;
                    document.getElementById('statActive').textContent = data.stats.active || 0;
                    document.getElementById('statTotal').textContent = data.stats.total || 0;
                }
            } catch(e) {
                console.error('Ошибка загрузки статистики:', e);
            }
        }

        async function loadChats() {
            try {
                const res = await fetch('/api/admin/chats');
                const data = await res.json();
                const container = document.getElementById('chatsList');
                
                if (!data.success || !data.chats || data.chats.length === 0) {
                    container.innerHTML = '<div style="padding: 40px; text-align: center; color: var(--gray-500);">Нет чатов</div>';
                    return;
                }

                container.innerHTML = data.chats.map(chat => `
                    <div class="chat-item ${chat.unread_count > 0 ? 'unread' : ''} ${currentChatId === chat.id ? 'active' : ''}" 
                         onclick="openChat(${chat.id})">
                        <div class="chat-item-header">
                            <span class="chat-item-name">${escapeHtml(chat.user_name || 'Аноним')}</span>
                            <span class="chat-item-time">${formatTime(chat.updated_at)}</span>
                        </div>
                        <div class="chat-item-last-message">${escapeHtml(chat.last_message || 'Нет сообщений')}</div>
                        <span class="chat-item-status status-${chat.is_closed ? 'closed' : 'active'}">
                            ${chat.is_closed ? '🔒 Закрыт' : '🟢 Активен'}
                            ${chat.unread_count > 0 ? ` • <strong>${chat.unread_count} новых</strong>` : ''}
                        </span>
                    </div>
                `).join('');
            } catch(e) {
                console.error('Ошибка загрузки чатов:', e);
                document.getElementById('chatsList').innerHTML = 
                    '<div style="padding: 40px; text-align: center; color: var(--gray-500);">Ошибка загрузки</div>';
            }
        }

        function formatTime(dateStr) {
            if (!dateStr) return 'неизвестно';
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;
            if (diff < 60000) return 'только что';
            if (diff < 3600000) return Math.floor(diff / 60000) + ' мин назад';
            if (diff < 86400000) return Math.floor(diff / 3600000) + ' ч назад';
            return date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
        }

        async function openChat(chatId, isPolling = false) {
            currentChatId = chatId;
            
            try {
                const res = await fetch(`/api/admin/chat/${chatId}`);
                const data = await res.json();
                
                if (!data.success) return;

                if (!isPolling) {
                    document.getElementById('chatUserName').textContent = data.user?.username || 'Неизвестно';
                    document.getElementById('chatUserEmail').textContent = data.user?.email || 'Нет email';
                    
                    const messagesContainer = document.getElementById('messagesContainer');
                    messagesContainer.innerHTML = '';
                    
                    (data.messages || []).forEach(msg => {
                        addMessage(msg.message, msg.sender_type, msg.created_at, msg.id);
                    });
                    
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                    document.getElementById('emptyState').style.display = 'none';
                    document.getElementById('chatDetail').style.display = 'flex';
                } else {
                    const messagesContainer = document.getElementById('messagesContainer');
                    const existingIds = new Set();
                    Array.from(messagesContainer.children).forEach(child => {
                        if (child.id) existingIds.add(child.id.replace('msg-', ''));
                    });
                    
                    const newMessages = (data.messages || []).filter(msg => !existingIds.has(msg.id.toString()));
                    newMessages.forEach(msg => {
                        addMessage(msg.message, msg.sender_type, msg.created_at, msg.id);
                    });
                    
                    if (newMessages.length > 0) {
                        messagesContainer.scrollTop = messagesContainer.scrollHeight;
                    }
                }
                
                loadChats();
            } catch(e) {
                console.error('Ошибка открытия чата:', e);
            }
        }

        function addMessage(text, type, timestamp, id) {
            const messagesContainer = document.getElementById('messagesContainer');
            if (document.getElementById(`msg-${id}`)) return;
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `message message-${type}`;
            msgDiv.id = `msg-${id}`;
            const escapedText = escapeHtml(text);
            const timeStr = timestamp ? new Date(timestamp).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' }) : '';
            
            msgDiv.innerHTML = `
                <div class="message-meta">
                    ${type === 'user' ? '👤 Пользователь' : '🛡️ Вы'} • ${timeStr}
                </div>
                <p class="message-text">${escapedText}</p>
            `;
            messagesContainer.appendChild(msgDiv);
        }

        function startPolling() {
            if (messagesInterval) clearInterval(messagesInterval);
            messagesInterval = setInterval(() => {
                if (currentChatId) openChat(currentChatId, true);
            }, 3000);
        }

        async function sendReply() {
            const message = document.getElementById('replyMessage').value.trim();
            if (!message) {
                alert('Введите сообщение');
                return;
            }
            if (!currentChatId) {
                alert('Чат не выбран');
                return;
            }

            const btn = document.querySelector('.reply-form .btn');
            btn.disabled = true;
            btn.textContent = '⏳ Отправка...';

            try {
                const res = await fetch(`/api/admin/chat/${currentChatId}/message`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('replyMessage').value = '';
                    await openChat(currentChatId, false);
                } else {
                    alert('Ошибка: ' + (data.error || 'Неизвестная ошибка'));
                }
            } catch(e) {
                console.error('Ошибка отправки:', e);
                alert('Ошибка отправки ответа');
            } finally {
                btn.disabled = false;
                btn.textContent = '📤 Отправить';
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            return String(text).replace(/[&<>"']/g, m => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
            }[m]));
        }

        // Инициализация
        (async function() {
            const ok = await checkAuth();
            if (ok) {
                loadStats();
                loadChats();
                startPolling();
            }
        })();

        window.addEventListener('beforeunload', () => {
            if (messagesInterval) clearInterval(messagesInterval);
        });
    </script>
</body>
</html>
