<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход администратора — LinkSnap</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/admin.css">
    <link rel="stylesheet" href="/dark-theme.css">
    <style>
        .auto-login {
            text-align: center;
            padding: 60px 40px;
        }
        .auto-login .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e2e8f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .login-form {
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <span class="logo">🛡️</span>
                <h1>LinkSnap Admin</h1>
                <p>Автоматический вход...</p>
            </div>
            <div class="auto-login" id="autoLogin">
                <div class="spinner"></div>
                <h2>Вход в админ-панель</h2>
                <p>Пожалуйста, подождите...</p>
            </div>
            <div class="login-form" id="loginForm" style="display: none;">
                <form onsubmit="manualLogin(event); return false;">
                    <div class="form-group">
                        <label for="username">Имя пользователя</label>
                        <input type="text" id="username" class="form-control" placeholder="admin">
                    </div>
                    <div class="form-group">
                        <label for="password">Пароль</label>
                        <input type="password" id="password" class="form-control" placeholder="пароль">
                    </div>
                    <button type="submit" class="btn btn-primary login-btn">🔐 Войти</button>
                </form>
            </div>
            <div class="back-link">
                <a href="/"><span>←</span> На главную</a>
            </div>
        </div>
    </div>

    <script>
        // Сначала делаем принудительный выход (сбрасываем старую сессию)
        async function forceLogout() {
            try {
                await fetch('/api/admin/logout', { method: 'POST' });
            } catch(e) {
                console.log('Ошибка при сбросе сессии:', e);
            }
        }

        // Автоматический вход
        async function autoLogin() {
            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: 'admin', password: 'any' })
                });
                
                const data = await res.json();
                
                if (data && data.success) {
                    window.location.href = '/admin';
                } else {
                    // Если автоматический вход не сработал, показываем форму
                    document.getElementById('autoLogin').style.display = 'none';
                    document.getElementById('loginForm').style.display = 'block';
                }
            } catch(e) {
                console.error('Ошибка авто входа:', e);
                document.getElementById('autoLogin').style.display = 'none';
                document.getElementById('loginForm').style.display = 'block';
            }
        }

        async function manualLogin(event) {
            event.preventDefault();
            const username = document.getElementById('username').value || 'admin';
            const password = document.getElementById('password').value || 'any';
            const btn = document.querySelector('.login-btn');
            
            btn.disabled = true;
            btn.textContent = '⏳ Вход...';
            
            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();
                
                if (data && data.success) {
                    window.location.href = '/admin';
                } else {
                    alert('Ошибка входа: ' + (data?.error || 'Неизвестная ошибка'));
                    btn.disabled = false;
                    btn.textContent = '🔐 Войти';
                }
            } catch(e) {
                console.error('Ошибка:', e);
                alert('Ошибка соединения с сервером');
                btn.disabled = false;
                btn.textContent = '🔐 Войти';
            }
        }

        // Запускаем процесс
        (async function() {
            // Сначала сбрасываем старую сессию
            await forceLogout();
            // Затем пробуем войти
            await autoLogin();
        })();
    </script>
</body>
</html>
