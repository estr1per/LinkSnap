<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход администратора — LinkSnap</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/admin.css">
    <link rel="stylesheet" href="/dark-theme.css">
</head>
<body>
    <div class="floating-shapes">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <span class="logo">🛡️</span>
                <h1>LinkSnap Admin</h1>
                <p>Вход для администратора</p>
            </div>

            <form onsubmit="login(event); return false;" autocomplete="off">
                <div class="form-group">
                    <label for="username">Имя пользователя</label>
                    <div class="input-wrapper username">
                        <input type="text" id="username" required placeholder="admin" autocomplete="off">
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <div class="input-wrapper password">
                        <input type="password" id="password" required placeholder="••••••••" autocomplete="new-password">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary login-btn">
                    🔐 Войти
                </button>
            </form>

            <div class="back-link">
                <a href="/"><span>←</span> На главную</a>
            </div>
        </div>
    </div>

    <script>
        async function login(event) {
            if (event) event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btn = document.querySelector('.login-btn');
            
            if (btn) {
                btn.disabled = true;
                btn.textContent = '⏳ Вход...';
            }
            
            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();
                
                if (data && data.success) {
                    window.location.href = '/admin';
                } else {
                    alert('Ошибка: ' + (data?.error || 'Неизвестная ошибка'));
                    if (btn) {
                        btn.disabled = false;
                        btn.textContent = '🔐 Войти';
                    }
                }
            } catch(e) {
                console.error('Ошибка входа:', e);
                alert('Ошибка соединения с сервером');
                if (btn) {
                    btn.disabled = false;
                    btn.textContent = '🔐 Войти';
                }
            }
        }

        // Проверка, не авторизован ли уже
        (async function() {
            try {
                const res = await fetch('/api/admin/me');
                if (res && res.ok) {
                    window.location.href = '/admin';
                }
            } catch(e) {
                // Не авторизован, это нормально
                console.log('Не авторизован');
            }
        })();
    </script>
</body>
</html>
