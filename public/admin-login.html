<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход администратора — LinkSnap</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/admin.css">
    <link rel="stylesheet" href="/dark-theme.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <span class="logo">🛡️</span>
                <h1>LinkSnap Admin</h1>
                <p>Вход для администратора</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Имя пользователя</label>
                    <input type="text" id="username" class="form-control" placeholder="admin" required>
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary login-btn">🔐 Войти</button>
            </form>

            <div class="back-link">
                <a href="/"><span>←</span> На главную</a>
            </div>
        </div>
    </div>

    <script>
        // Сначала делаем принудительный выход, чтобы сбросить старую сессию
        async function forceLogout() {
            try {
                await fetch('/api/admin/logout', { method: 'POST' });
            } catch(e) {
                console.log('Ошибка при сбросе сессии:', e);
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btn = document.querySelector('.login-btn');
            
            btn.disabled = true;
            btn.textContent = '⏳ Вход...';
            
            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    window.location.href = '/admin';
                } else {
                    alert('Ошибка: ' + (data.error || 'Неверный логин или пароль'));
                    btn.disabled = false;
                    btn.textContent = '🔐 Войти';
                }
            } catch(e) {
                console.error('Ошибка входа:', e);
                alert('Ошибка соединения с сервером');
                btn.disabled = false;
                btn.textContent = '🔐 Войти';
            }
        });

        // При загрузке страницы сбрасываем сессию
        forceLogout();
    </script>
</body>
</html>
