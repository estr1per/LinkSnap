<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход администратора — LinkSnap</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/admin.css">
    <link rel="stylesheet" href="/dark-theme.css">
    <style>
        /* Дополнительные стили на всякий случай */
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="floating-shapes">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <span class="logo">🛡️</span>
                <h1>LinkSnap Admin</h1>
                <p>Вход для администратора</p>
            </div>

            <form id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label for="username">Имя пользователя</label>
                    <div class="input-wrapper username">
                        <input type="text" id="username" required placeholder="admin" autocomplete="off">
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <div class="input-wrapper password">
                        <input type="password" id="password" required placeholder="••••••••" autocomplete="new-password">
                    </div>
                </div>
                <button type="button" class="btn btn-primary login-btn" onclick="login()">
                    🔐 Войти
                </button>
            </form>

            <div class="back-link">
                <a href="/"><span>←</span> На главную</a>
            </div>
        </div>
    </div>

    <script>
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btn = document.querySelector('.login-btn');
            
            if (!username || !password) {
                alert('Введите логин и пароль');
                return;
            }
            
            if (btn) {
                btn.disabled = true;
                btn.textContent = '⏳ Вход...';
            }
            
            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();
                
                if (data && data.success) {
                    window.location.href = '/admin';
                } else {
                    alert('Ошибка: ' + (data?.error || 'Неверный логин или пароль'));
                    if (btn) {
                        btn.disabled = false;
                        btn.textContent = '🔐 Войти';
                    }
                }
            } catch(e) {
                console.error('Ошибка входа:', e);
                alert('Ошибка соединения с сервером');
                if (btn) {
                    btn.disabled = false;
                    btn.textContent = '🔐 Войти';
                }
            }
        }

        // Проверка при загрузке - если уже авторизован
        (async function() {
            try {
                const res = await fetch('/api/admin/me');
                if (res && res.ok) {
                    const data = await res.json();
                    if (data && data.success) {
                        window.location.href = '/admin';
                    }
                }
            } catch(e) {
                // Не авторизован, остаемся на странице
                console.log('Требуется вход');
            }
        })();

        // Добавляем обработчик Enter
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
