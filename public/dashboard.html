<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дашборд - LinkSnap</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/dark-theme.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    <style>
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .dashboard-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 20px;
            border: 1px solid var(--surface-light);
            text-align: center;
            transition: transform 0.3s;
        }
        .dashboard-card:hover { transform: translateY(-5px); }
        .dashboard-card .icon { font-size: 2.5rem; margin-bottom: 10px; }
        .dashboard-card .value { font-size: 2rem; font-weight: 800; color: var(--primary); }
        .dashboard-card .label { color: var(--text-secondary); font-size: 0.9rem; }
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .chart-container {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 20px;
            border: 1px solid var(--surface-light);
        }
        .chart-container h3 { margin-bottom: 20px; color: var(--text-primary); }
        canvas { max-height: 300px; }
        .recent-links {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 20px;
            border: 1px solid var(--surface-light);
        }
        .recent-links h3 { margin-bottom: 20px; }
        .recent-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid var(--surface-light);
        }
        .recent-item:last-child { border-bottom: none; }
        .recent-url {
            flex: 1;
            font-size: 0.9rem;
            word-break: break-all;
            margin-right: 15px;
        }
        .recent-clicks {
            background: var(--primary-light);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        @media (max-width: 1024px) {
            .dashboard-grid { grid-template-columns: repeat(2, 1fr); }
            .charts-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 640px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }
        .greeting { margin-bottom: 25px; }
        .greeting h1 { font-size: 1.8rem; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <header class="site-header">
            <div class="logo-container">
                <span class="logo">📊</span>
                <a href="/" class="site-title">LinkSnap</a>
            </div>
            <div class="user-nav">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar"></div>
                    <span class="user-name" id="username">Загрузка...</span>
                </div>
                <div class="theme-switch-wrapper">
                    <span class="theme-icon">🌙</span>
                    <label class="theme-switch">
                        <input type="checkbox" id="themeToggle">
                        <span class="theme-slider"></span>
                    </label>
                    <span class="theme-icon">☀️</span>
                </div>
                <a href="/profile" class="nav-btn">Профиль</a>
                <a href="/batch" class="nav-btn">Массовое</a>
                <a href="/pricing" class="nav-btn">Тарифы</a>
                <a href="/converter" class="nav-btn">Конвертер</a>
                <a href="/image-editor" class="nav-btn">Редактор</a>
                <button onclick="logout()" class="btn btn-danger btn-sm">Выйти</button>
            </div>
        </header>

        <div class="greeting">
            <h1 id="greetingText">Добро пожаловать!</h1>
        </div>

        <div class="dashboard-grid">
            <div class="dashboard-card">
                <div class="icon">🔗</div>
                <div class="value" id="totalLinks">0</div>
                <div class="label">Всего ссылок</div>
            </div>
            <div class="dashboard-card">
                <div class="icon">👆</div>
                <div class="value" id="totalClicks">0</div>
                <div class="label">Всего кликов</div>
            </div>
            <div class="dashboard-card">
                <div class="icon">📱</div>
                <div class="value" id="totalQRCodes">0</div>
                <div class="label">QR-кодов</div>
            </div>
            <div class="dashboard-card">
                <div class="icon">⭐</div>
                <div class="value" id="topClicks">0</div>
                <div class="label">Макс. кликов</div>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-container">
                <h3>📱 Устройства</h3>
                <canvas id="devicesChart"></canvas>
            </div>
        </div>

        <div class="recent-links">
            <h3>🔗 Последние ссылки</h3>
            <div id="recentLinksList">
                <div class="loading"><div class="loading-spinner"></div><span>Загрузка...</span></div>
            </div>
        </div>
    </div>

    <script>
        let devicesChart = null;

async function checkAuth() {
    try {
        const res = await fetch('/api/user');
        if (res.status === 401) { 
            window.location.href = '/login'; 
            return false; 
        }
        const user = await res.json();
        document.getElementById('username').textContent = user.username;
        document.getElementById('userAvatar').textContent = user.username.charAt(0).toUpperCase();
        
        const hour = new Date().getHours();
        let greeting = '';
        if (hour < 12) greeting = 'Доброе утро';
        else if (hour < 18) greeting = 'Добрый день';
        else greeting = 'Добрый вечер';
        document.getElementById('greetingText').textContent = `${greeting}, ${user.username}!`;
        
        await loadDashboardData();
        return true;
    } catch(e) { 
        console.error('Ошибка авторизации:', e);
        window.location.href = '/login'; 
        return false; 
    }
}

async function logout() {
    await fetch('/api/logout', { method: 'POST' });
    window.location.href = '/login';
}

async function loadDashboardData() {
    try {
        // Загружаем ссылки
        const linksRes = await fetch('/api/links?limit=1000');
        const linksData = await linksRes.json();
        const links = Array.isArray(linksData) ? linksData : (linksData.data || []);
        
        // Загружаем базовую аналитику
        const analyticsRes = await fetch('/api/analytics/summary');
        const analytics = await analyticsRes.json();
        
        // Загружаем расширенную статистику для дашборда (устройства)
        const statsRes = await fetch('/api/analytics/dashboard-stats');
        const statsData = await statsRes.json();
        
        const totalLinks = links?.length || 0;
        const totalClicks = links?.reduce((sum, l) => sum + (l.clicks || 0), 0) || 0;
        const maxClicks = Math.max(...(links?.map(l => l.clicks || 0) || [0]));
        
        document.getElementById('totalLinks').textContent = totalLinks;
        document.getElementById('totalClicks').textContent = totalClicks;
        document.getElementById('topClicks').textContent = maxClicks;
        
        // Загружаем QR-коды
        const qrRes = await fetch('/api/qrcodes');
        const qrcodes = await qrRes.json();
        document.getElementById('totalQRCodes').textContent = qrcodes?.length || 0;
        
        // Последние ссылки
        const recent = (links || []).slice(0, 10);
        renderRecentLinks(recent);
        
        // Рендерим график устройств
        renderCharts(statsData.devices || []);
        
    } catch(e) {
        console.error('Ошибка загрузки:', e);
    }
}

function renderRecentLinks(links) {
    const container = document.getElementById('recentLinksList');
    if (!links || !links.length) {
        container.innerHTML = '<p class="empty-state">Нет созданных ссылок</p>';
        return;
    }
    container.innerHTML = links.map(link => `
        <div class="recent-item">
            <div class="recent-url">
                <a href="/${escapeHtml(link.short_code)}" target="_blank" style="color: var(--primary);">
                    /${escapeHtml(link.short_code)}
                </a>
                <small style="display: block; color: var(--text-muted);">${escapeHtml(link.original_url?.substring(0, 60) || '')}${link.original_url?.length > 60 ? '...' : ''}</small>
            </div>
            <div class="recent-clicks">👆 ${link.clicks || 0}</div>
        </div>
    `).join('');
}

function renderCharts(deviceStats) {
    // График устройств
    const ctxDevices = document.getElementById('devicesChart').getContext('2d');
    if (devicesChart) devicesChart.destroy();
    
    // Подготавливаем данные для графика устройств
    const deviceLabels = [];
    const deviceData = [];
    const backgroundColors = ['#6366f1', '#a855f7', '#ec4899', '#f59e0b', '#10b981', '#6b7280'];
    
    if (deviceStats && deviceStats.length > 0) {
        deviceStats.forEach((stat, index) => {
            let label = 'Другие';
            if (stat.device_type === 'desktop') label = '💻 Десктоп';
            else if (stat.device_type === 'mobile') label = '📱 Мобильные';
            else if (stat.device_type === 'tablet') label = '📟 Планшеты';
            else if (stat.device_type === 'bot') label = '🤖 Боты';
            else label = '❓ ' + (stat.device_type || 'Неизвестно');
            
            deviceLabels.push(label);
            deviceData.push(stat.count);
        });
    } else {
        // Если данных нет, показываем сообщение-заглушку
        deviceLabels.push('Нет данных');
        deviceData.push(1);
    }
    
    devicesChart = new Chart(ctxDevices, {
        type: 'doughnut',
        data: {
            labels: deviceLabels,
            datasets: [{
                data: deviceData,
                backgroundColor: backgroundColors.slice(0, deviceLabels.length),
                borderWidth: 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
                legend: { position: 'bottom', labels: { color: getComputedStyle(document.body).getPropertyValue('--text-primary') || '#333' } }
            }
        }
    });
}
    
function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
}

// Тёмная тема (без изменений)
(function() {
    const themeToggle = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem('linksnap-theme');
    if (savedTheme === 'dark') {
        document.body.classList.add('dark-theme');
        if (themeToggle) themeToggle.checked = true;
    }
    if (themeToggle) {
        themeToggle.addEventListener('change', function() {
            if (this.checked) {
                document.body.classList.add('dark-theme');
                localStorage.setItem('linksnap-theme', 'dark');
            } else {
                document.body.classList.remove('dark-theme');
                localStorage.setItem('linksnap-theme', 'light');
            }
            setTimeout(() => loadDashboardData(), 50);
        });
    }
})();

document.addEventListener('DOMContentLoaded', checkAuth);
    </script>

    <script src="/chat-widget.js?v=5" defer></script>
</body>
</html>
