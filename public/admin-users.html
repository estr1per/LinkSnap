<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель — Пользователи и тарифы</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/admin.css">

    <link rel="stylesheet" href="/dark-theme.css">
</head>
<body>
    <div class="admin-header">
        <div class="container">
            <div class="logo-container">
                <span class="logo">👥</span>
                <span class="site-title">LinkSnap Admin — Пользователи</span>
            </div>
            <div class="admin-nav">
                <a href="/admin">💬 Чаты</a>
                <a href="/admin/users" class="active-nav">👥 Пользователи</a>
                <a href="#" onclick="logout()">🚪 Выйти</a>
            </div>
        </div>
    </div>

    <div class="container" id="authCheck" style="text-align: center; padding: 50px;">
        <div class="loading"><div class="loading-spinner"></div><span>Проверка авторизации...</span></div>
    </div>

    <div class="container" id="adminPanel" style="display: none;">
        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-card-icon">👥</span>
                <h3 id="statTotal">0</h3>
                <p>Всего пользователей</p>
            </div>
            <div class="stat-card">
                <span class="stat-card-icon">🆓</span>
                <h3 id="statFree">0</h3>
                <p>Бесплатный тариф</p>
            </div>
            <div class="stat-card">
                <span class="stat-card-icon">⭐</span>
                <h3 id="statPremium">0</h3>
                <p>Премиум</p>
            </div>
            <div class="stat-card">
                <span class="stat-card-icon">💼</span>
                <h3 id="statBusiness">0</h3>
                <p>Бизнес</p>
            </div>
        </div>

        <div class="filter-bar">
            <label>📊 Фильтр по тарифу:</label>
            <select id="planFilter" onchange="loadUsers()">
                <option value="">Все тарифы</option>
                <option value="free">Бесплатный</option>
                <option value="premium">Премиум</option>
                <option value="business">Бизнес</option>
            </select>
            <button class="btn btn-sm" onclick="loadUsers()">🔄 Обновить</button>
        </div>

        <div class="users-table">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Пользователь</th>
                        <th>Email</th>
                        <th>Тариф</th>
                        <th>Ссылки</th>
                        <th>QR-коды</th>
                        <th>Дата регистрации</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <tr>
                        <td colspan="8" style="text-align: center; padding: 40px; color: var(--gray-500); font-weight: 500;">Загрузка...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Модальное окно смены тарифа -->
    <div class="modal" id="changePlanModal">
        <div class="modal-content">
            <h3>✏️ Изменить тариф</h3>
            <p id="modalUserName" style="margin-bottom: 15px; color: var(--gray-700);"></p>
            <select id="newPlanSelect">
                <option value="free">🆓 Бесплатный</option>
                <option value="premium">⭐ Премиум</option>
                <option value="business">💼 Бизнес</option>
            </select>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeModal()">Отмена</button>
                <button class="btn-primary" onclick="confirmChangePlan()">Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        let currentUserId = null;
        let allUsers = [];

        async function checkAdminAuth() {
            try {
                const res = await fetch('/api/admin/me');
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('authCheck').style.display = 'none';
                    document.getElementById('adminPanel').style.display = 'block';
                    loadUsers();
                } else {
                    window.location.href = '/admin/login';
                }
            } catch(e) {
                console.error('Ошибка проверки авторизации:', e);
                window.location.href = '/admin/login';
            }
        }

        async function loadUsers() {
            try {
                const planFilter = document.getElementById('planFilter').value;
                const url = planFilter 
                    ? `/api/admin/users?plan=${planFilter}`
                    : '/api/admin/users';
                
                const res = await fetch(url);
                const data = await res.json();
                
                allUsers = data.users || [];
                
                // Обновляем статистику
                updateStats(allUsers);
                
                const tbody = document.getElementById('usersTableBody');
                
                if (!allUsers.length) {
                    tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 40px; color: var(--gray-500); font-weight: 500;">Нет пользователей</td></tr>';
                    return;
                }

                tbody.innerHTML = allUsers.map(user => `
                    <tr>
                        <td>${user.id}</td>
                        <td><strong>${escapeHtml(user.username)}</strong></td>
                        <td>${escapeHtml(user.email)}</td>
                        <td>
                            <span class="plan-badge plan-${user.plan_type}">
                                ${getPlanName(user.plan_type)}
                            </span>
                        </td>
                        <td>${user.total_links || 0}</td>
                        <td>${user.total_qrcodes || 0}</td>
                        <td>${formatDate(user.created_at)}</td>
                        <td>
                            <button class="change-plan-btn" onclick="openChangePlanModal(${user.id}, '${escapeHtml(user.username)}', '${user.plan_type}')">
                                ✏️ Изменить
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch(e) {
                console.error('Ошибка загрузки пользователей:', e);
                document.getElementById('usersTableBody').innerHTML = 
                    '<tr><td colspan="8" style="text-align: center; padding: 40px; color: var(--danger); font-weight: 600;">Ошибка загрузки</td></tr>';
            }
        }

        function updateStats(users) {
            const total = users.length;
            const free = users.filter(u => u.plan_type === 'free').length;
            const premium = users.filter(u => u.plan_type === 'premium').length;
            const business = users.filter(u => u.plan_type === 'business').length;
            
            document.getElementById('statTotal').textContent = total;
            document.getElementById('statFree').textContent = free;
            document.getElementById('statPremium').textContent = premium;
            document.getElementById('statBusiness').textContent = business;
        }

        function getPlanName(plan) {
            const names = {
                'free': '🆓 Бесплатный',
                'premium': '⭐ Премиум',
                'business': '💼 Бизнес'
            };
            return names[plan] || plan;
        }

        function formatDate(dateStr) {
            return new Date(dateStr).toLocaleDateString('ru-RU', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
        }

        function openChangePlanModal(userId, username, currentPlan) {
            currentUserId = userId;
            document.getElementById('modalUserName').textContent = `Пользователь: ${username}`;
            document.getElementById('newPlanSelect').value = currentPlan;
            document.getElementById('changePlanModal').classList.add('active');
        }

        function closeModal() {
            currentUserId = null;
            document.getElementById('changePlanModal').classList.remove('active');
        }

        async function confirmChangePlan() {
            if (!currentUserId) return;
            
            const newPlan = document.getElementById('newPlanSelect').value;
            
            try {
                const res = await fetch(`/api/admin/users/${currentUserId}/plan`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ planType: newPlan })
                });

                const data = await res.json();
                
                if (data.success) {
                    alert(`Тариф изменён на ${getPlanName(newPlan)}`);
                    closeModal();
                    loadUsers();
                } else {
                    alert('Ошибка: ' + data.error);
                }
            } catch(e) {
                console.error('Ошибка изменения тарифа:', e);
                alert('Ошибка изменения тарифа');
            }
        }

        async function logout() {
    try {
        const res = await fetch('/api/admin/logout', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
        });
        const data = await res.json();
        // Даже если ошибка - все равно перенаправляем
        window.location.href = '/admin/login';
    } catch(e) {
        console.error('Ошибка выхода:', e);
        window.location.href = '/admin/login';
    }
}

        function escapeHtml(text) {
            if (!text) return '';
            return String(text).replace(/[&<>"']/g, m => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            }[m]));
        }

        // Инициализация
        checkAdminAuth();
    </script>
</body>
</html>
