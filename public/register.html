<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - LinkSnap</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/dark-theme.css">
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔗</text></svg>">
    <style>
        .theme-switch-wrapper {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .theme-switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .theme-switch input { opacity: 0; width: 0; height: 0; }
        .theme-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: 0.3s; border-radius: 34px; }
        .theme-slider:before { position: absolute; content: "☀️"; display: flex; align-items: center; justify-content: center; height: 20px; width: 20px; left: 3px; bottom: 2px; background-color: white; transition: 0.3s; border-radius: 50%; font-size: 12px; }
        input:checked + .theme-slider { background-color: #6366f1; }
        input:checked + .theme-slider:before { transform: translateX(26px); content: "🌙"; }
        .theme-icon { font-size: 16px; }
        .auth-form { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        body.dark-theme .auth-form { background: rgba(30, 41, 59, 0.95); }
        .auth-form h1 { color: #333; -webkit-text-fill-color: #333; }
        body.dark-theme .auth-form h1 { color: #f1f5f9; -webkit-text-fill-color: #f1f5f9; }
        .auth-form input { background: white; color: #333; }
        body.dark-theme .auth-form input { background: #1e293b; color: #f1f5f9; border-color: #475569; }
    </style>
</head>
<body>
    
    <div class="auth-container">
        <div class="auth-form">
            <h1>🔗 Регистрация в LinkSnap</h1>   
            <form id="registerForm">
                <input type="text" name="username" class="form-control" placeholder="Имя пользователя" required autocomplete="username" minlength="3" maxlength="30">
                <input type="email" name="email" class="form-control" placeholder="Email" required autocomplete="email">
                <input type="password" name="password" class="form-control" placeholder="Пароль" required autocomplete="new-password" minlength="6">
                <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
            </form>
            <div id="registerMessage" class="alert" style="display: none;"></div>
            <p class="auth-link">Уже есть аккаунт? <a href="/login">Войти</a></p>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const submitButton = form.querySelector('button[type="submit"]');
            const messageDiv = document.getElementById('registerMessage');
            const formData = new FormData(form);
            const data = { username: formData.get('username').trim(), email: formData.get('email').trim(), password: formData.get('password') };
            if (!data.username || !data.email || !data.password) { showMessage('Пожалуйста, заполните все поля', 'error'); return; }
            if (data.username.length < 3) { showMessage('Имя пользователя должно быть не менее 3 символов', 'error'); return; }
            if (data.password.length < 6) { showMessage('Пароль должен быть не менее 6 символов', 'error'); return; }
            if (!isValidEmail(data.email)) { showMessage('Введите корректный email адрес', 'error'); return; }
            submitButton.disabled = true; submitButton.textContent = 'Регистрация...';
            messageDiv.style.display = 'none';
            try {
                const response = await fetch('/api/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                const result = await response.json();
                if (response.ok) {
                    showMessage('✅ Регистрация успешна! Выполняем вход...', 'success');
                    const loginResponse = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: data.email, password: data.password }) });
                    if (loginResponse.ok) { setTimeout(() => { window.location.href = '/dashboard'; }, 1500); }
                    else { setTimeout(() => { window.location.href = '/login'; }, 1500); }
                } else { showMessage(result.error || 'Ошибка регистрации', 'error'); }
            } catch (error) { showMessage('Ошибка соединения с сервером', 'error'); }
            finally { submitButton.disabled = false; submitButton.textContent = 'Зарегистрироваться'; }
        });
        function showMessage(text, type) {
            const messageDiv = document.getElementById('registerMessage');
            messageDiv.textContent = text;
            messageDiv.className = `alert alert-${type}`;
            messageDiv.style.display = 'block';
        }
        function isValidEmail(email) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email); }
        
    </script>
</body>
</html>
