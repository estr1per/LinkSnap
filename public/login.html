<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - LinkSnap</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/dark-theme.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔗</text></svg>">
    <style>
        .theme-switch-wrapper {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .theme-switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .theme-switch input { opacity: 0; width: 0; height: 0; }
        .theme-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: 0.3s; border-radius: 34px; }
        .theme-slider:before { position: absolute; content: "☀️"; display: flex; align-items: center; justify-content: center; height: 20px; width: 20px; left: 3px; bottom: 2px; background-color: white; transition: 0.3s; border-radius: 50%; font-size: 12px; }
        input:checked + .theme-slider { background-color: #6366f1; }
        input:checked + .theme-slider:before { transform: translateX(26px); content: "🌙"; }
        .theme-icon { font-size: 16px; }
    </style>
</head>
<body>
    
    <div class="auth-container">
        <div class="auth-form">
            <h1>🔗 Вход в LinkSnap</h1>
            <form id="loginForm">
                <input type="email" name="email" class="form-control" placeholder="Email" required autocomplete="email">
                <input type="password" name="password" class="form-control" placeholder="Пароль" required autocomplete="current-password">
                <button type="submit" class="btn btn-primary">Войти</button>
            </form>
            <div id="loginMessage" class="alert" style="display: none;"></div>
            <p class="auth-link">Нет аккаунта? <a href="/register">Зарегистрироваться</a></p>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const submitButton = form.querySelector('button');
            const messageDiv = document.getElementById('loginMessage');
            const data = { email: form.email.value.trim(), password: form.password.value };
            if (!data.email || !data.password) { showMessage('Заполните все поля', 'error'); return; }
            submitButton.disabled = true; submitButton.textContent = 'Вход...';
            messageDiv.style.display = 'none';
            try {
                const resp = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                const result = await resp.json();
                if (resp.ok) {
                    showMessage('Вход выполнен! Перенаправляем...', 'success');
                    setTimeout(() => window.location.href = '/', 1000);
                } else { showMessage(result.error || 'Ошибка входа', 'error'); }
            } catch(e) { showMessage('Ошибка соединения', 'error'); }
            finally { submitButton.disabled = false; submitButton.textContent = 'Войти'; }
        });
        function showMessage(text, type) {
            const msg = document.getElementById('loginMessage');
            msg.textContent = text;
            msg.className = `alert alert-${type}`;
            msg.style.display = 'block';
        }
        
    </script>
</body>
</html>
